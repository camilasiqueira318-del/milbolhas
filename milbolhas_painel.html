<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mil Bolhas · Painel de Pedidos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a3a6b;
    --blue: #2f6db5;
    --sky: #4fa3d1;
    --light: #f0f5fb;
    --white: #ffffff;
    --gray: #6b7c99;
    --green: #1a9e50;
    --red: #e74c3c;
    --orange: #f39c12;
    --border: #dde6f0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Barlow', sans-serif;
    background: linear-gradient(135deg, #0d1f3c 0%, #1a3a6b 50%, #2f6db5 100%);
    min-height: 100vh;
    color: var(--navy);
  }

  /* ── LOGIN ── */
  #loginScreen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
  }
  .login-box {
    background: white;
    border-radius: 24px;
    padding: 48px 40px;
    width: 100%; max-width: 400px;
    box-shadow: 0 30px 80px rgba(0,0,0,.4);
    text-align: center;
  }
  .login-logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 2rem; font-weight: 900;
    color: var(--navy); letter-spacing: -1px;
    margin-bottom: 6px;
  }
  .login-sub { font-size: .85rem; color: var(--gray); margin-bottom: 32px; }
  .login-label {
    display: block; text-align: left;
    font-size: .75rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: var(--navy); margin-bottom: 6px;
  }
  .login-input {
    width: 100%; padding: 14px 16px;
    border: 2px solid var(--border); border-radius: 12px;
    font-family: 'Barlow', sans-serif; font-size: 1rem;
    color: var(--navy); margin-bottom: 20px;
    transition: border-color .2s;
  }
  .login-input:focus { outline: none; border-color: var(--blue); }
  .login-btn {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, var(--navy), var(--blue));
    color: white; border: none; border-radius: 12px;
    font-family: 'Barlow', sans-serif; font-size: 1rem; font-weight: 800;
    cursor: pointer; letter-spacing: .5px;
    transition: transform .15s, box-shadow .15s;
  }
  .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(47,109,181,.4); }
  .login-error { color: var(--red); font-size: .82rem; margin-top: 10px; display: none; }

  /* ── DASHBOARD ── */
  #dashboard { display: none; min-height: 100vh; }

  .topbar {
    background: rgba(255,255,255,.08);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,.12);
    padding: 16px 32px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-brand {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.5rem; font-weight: 900;
    color: white; letter-spacing: -1px;
  }
  .topbar-brand span { color: #7ecef4; }
  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .badge-new {
    background: var(--red); color: white;
    font-size: .72rem; font-weight: 800;
    padding: 3px 9px; border-radius: 20px;
    display: none; animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  .logout-btn {
    background: rgba(255,255,255,.15); color: white;
    border: 1px solid rgba(255,255,255,.3);
    padding: 7px 16px; border-radius: 8px;
    font-family: 'Barlow', sans-serif; font-size: .82rem; font-weight: 700;
    cursor: pointer; transition: background .2s;
  }
  .logout-btn:hover { background: rgba(255,255,255,.25); }

  .dash-body { padding: 32px; max-width: 1100px; margin: 0 auto; }

  /* ── STATS ── */
  .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 32px; }
  .stat-card {
    background: rgba(255,255,255,.1); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 16px; padding: 20px 24px; color: white;
  }
  .stat-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 2.2rem; font-weight: 900; line-height: 1;
  }
  .stat-label { font-size: .78rem; opacity: .7; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
  .stat-card.green .stat-num { color: #5eecaa; }
  .stat-card.orange .stat-num { color: #ffd07a; }

  /* ── FILTERS ── */
  .filters-bar {
    background: rgba(255,255,255,.08); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 16px; padding: 16px 20px;
    display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 7px 18px; border-radius: 20px;
    border: 1px solid rgba(255,255,255,.3); background: transparent;
    color: rgba(255,255,255,.7); font-family: 'Barlow', sans-serif;
    font-size: .8rem; font-weight: 700; cursor: pointer;
    transition: all .2s;
  }
  .filter-btn.active, .filter-btn:hover {
    background: white; color: var(--navy); border-color: white;
  }
  .filter-search {
    flex: 1; min-width: 180px;
    padding: 8px 14px; border-radius: 20px;
    border: 1px solid rgba(255,255,255,.3);
    background: rgba(255,255,255,.1); color: white;
    font-family: 'Barlow', sans-serif; font-size: .85rem;
  }
  .filter-search::placeholder { color: rgba(255,255,255,.5); }
  .filter-search:focus { outline: none; border-color: rgba(255,255,255,.6); }
  .refresh-btn {
    background: rgba(255,255,255,.15); color: white;
    border: 1px solid rgba(255,255,255,.3);
    padding: 8px 16px; border-radius: 20px;
    font-family: 'Barlow', sans-serif; font-size: .8rem; font-weight: 700;
    cursor: pointer; transition: all .2s; margin-left: auto;
  }
  .refresh-btn:hover { background: rgba(255,255,255,.25); }

  /* ── ORDER CARDS ── */
  #ordersList { display: flex; flex-direction: column; gap: 14px; }

  .order-card {
    background: white; border-radius: 16px;
    overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,.12);
    transition: transform .2s, box-shadow .2s;
  }
  .order-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .order-card.is-new { border-left: 4px solid var(--red); }

  .order-header {
    padding: 16px 20px;
    display: flex; align-items: center; gap: 16px;
    cursor: pointer; user-select: none;
  }
  .order-code {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem; font-weight: 900; color: var(--navy);
    background: var(--light); padding: 4px 10px; border-radius: 8px;
    white-space: nowrap;
  }
  .order-client { flex: 1; }
  .order-client-name { font-weight: 700; font-size: .95rem; color: var(--navy); }
  .order-client-date { font-size: .75rem; color: var(--gray); }
  .order-total {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.3rem; font-weight: 800; color: var(--blue);
    white-space: nowrap;
  }
  .order-status {
    font-size: .72rem; font-weight: 800; padding: 4px 10px;
    border-radius: 20px; white-space: nowrap;
    text-transform: uppercase; letter-spacing: .5px;
  }
  .status-Novo { background: #fde8e8; color: var(--red); }
  .status-Visto { background: #fff3cd; color: #856404; }
  .status-Confirmado { background: #d4edda; color: var(--green); }
  .status-Cancelado { background: #f8d7da; color: #721c24; }
  .order-toggle { color: var(--gray); font-size: .9rem; }

  .order-body {
    padding: 0 20px 20px;
    display: none;
    border-top: 1px solid var(--border);
    padding-top: 16px;
  }
  .order-body.open { display: block; }
  .order-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 24px; margin-bottom: 16px; }
  .order-info-item label { font-size: .72rem; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: 1px; display: block; }
  .order-info-item span { font-size: .88rem; color: var(--navy); font-weight: 600; }

  .order-items-title { font-size: .72rem; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .order-item-row {
    display: flex; justify-content: space-between;
    padding: 7px 12px; background: var(--light); border-radius: 8px;
    font-size: .84rem; margin-bottom: 6px;
  }
  .order-item-row span:first-child { color: var(--navy); font-weight: 600; flex: 1; }
  .order-item-row span:last-child { color: var(--blue); font-weight: 800; }

  .order-actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
  .action-btn {
    padding: 8px 16px; border-radius: 8px; border: none;
    font-family: 'Barlow', sans-serif; font-size: .78rem; font-weight: 700;
    cursor: pointer; transition: all .15s;
  }
  .btn-wpp { background: #25d366; color: white; }
  .btn-wpp:hover { background: #1da855; }
  .btn-visto { background: #fff3cd; color: #856404; border: 1px solid #ffc107; }
  .btn-visto:hover { background: #ffc107; color: white; }
  .btn-confirmar { background: #d4edda; color: var(--green); border: 1px solid var(--green); }
  .btn-confirmar:hover { background: var(--green); color: white; }
  .btn-cancelar { background: #f8d7da; color: var(--red); border: 1px solid var(--red); }
  .btn-cancelar:hover { background: var(--red); color: white; }
  .btn-delete { background: #f8d7da; color: var(--red); border: 1px solid var(--red); margin-left: auto; }
  .btn-delete:hover { background: var(--red); color: white; }

  /* ── EMPTY / LOADING ── */
  .empty-state {
    text-align: center; padding: 60px 20px; color: rgba(255,255,255,.5);
  }
  .empty-icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-text { font-size: 1rem; }

  /* ── NOTIFICATION TOAST ── */
  #toast {
    position: fixed; top: 24px; right: 24px;
    background: var(--navy); color: white;
    padding: 14px 20px; border-radius: 12px;
    font-size: .88rem; font-weight: 600;
    box-shadow: 0 8px 32px rgba(0,0,0,.3);
    display: none; z-index: 9999;
    animation: slideIn .3s ease;
    border-left: 4px solid var(--red);
  }
  @keyframes slideIn { from{transform:translateX(100px);opacity:0} to{transform:translateX(0);opacity:1} }

  @media(max-width:700px){
    .stats-row { grid-template-columns: 1fr 1fr; }
    .dash-body { padding: 16px; }
    .topbar { padding: 12px 16px; }
    .order-info-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">🫧 Mil Bolhas</div>
    <div class="login-sub">Painel de Pedidos · Acesso Restrito</div>
    <label class="login-label" for="pwInput">Senha</label>
    <input type="password" id="pwInput" class="login-input" placeholder="Digite sua senha" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Entrar no Painel →</button>
    <div class="login-error" id="loginError">❌ Senha incorreta. Tente novamente.</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-brand">🫧 Mil Bolhas <span>· Pedidos</span></div>
    <div class="topbar-right">
      <span class="badge-new" id="badgeNew">● NOVO PEDIDO</span>
      <button class="logout-btn" onclick="doLogout()">Sair</button>
    </div>
  </div>

  <div class="dash-body">
    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-label">Total de Pedidos</div>
      </div>
      <div class="stat-card" style="border-left: 3px solid #ff6b6b;">
        <div class="stat-num" id="statNovos" style="color:#ff8fa3;">0</div>
        <div class="stat-label">Novos (não vistos)</div>
      </div>
      <div class="stat-card green">
        <div class="stat-num" id="statConfirmados">0</div>
        <div class="stat-label">Confirmados</div>
      </div>
      <div class="stat-card orange">
        <div class="stat-num" id="statValor">R$ 0</div>
        <div class="stat-label">Valor Total (confirmados)</div>
      </div>
    </div>

    <!-- FILTERS -->
    <div class="filters-bar">
      <button class="filter-btn active" onclick="setFilter('Todos', this)">Todos</button>
      <button class="filter-btn" onclick="setFilter('Novo', this)">🔴 Novos</button>
      <button class="filter-btn" onclick="setFilter('Visto', this)">🟡 Vistos</button>
      <button class="filter-btn" onclick="setFilter('Confirmado', this)">🟢 Confirmados</button>
      <button class="filter-btn" onclick="setFilter('Cancelado', this)">⚫ Cancelados</button>
      <input type="text" class="filter-search" id="searchInput" placeholder="🔍 Buscar por cliente, CNPJ ou código..." oninput="renderOrders()">
      <button class="refresh-btn" onclick="loadOrders(true)">↺ Atualizar</button>
    </div>

    <!-- ORDERS LIST -->
    <div id="ordersList">
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-text">Carregando pedidos...</div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const SENHA = 'Bolh@1812044';
const STORAGE_KEY = 'milbolhas:pedidos';
let allOrders = [];
let currentFilter = 'Todos';
let lastCount = 0;
let pollInterval = null;

// ── LOGIN ────────────────────────────────────────────────────
function doLogin() {
  const pw = document.getElementById('pwInput').value;
  if (pw === SENHA) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadOrders();
    startPolling();
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}

function doLogout() {
  clearInterval(pollInterval);
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('pwInput').value = '';
}

// ── STORAGE ──────────────────────────────────────────────────
async function loadOrders(showToast = false) {
  try {
    const result = await window.storage.get(STORAGE_KEY, true);
    if (result) {
      allOrders = JSON.parse(result.value);
    } else {
      allOrders = [];
    }
  } catch(e) {
    allOrders = [];
  }
  renderOrders();
  updateStats();
  if (showToast) showToastMsg('✅ Pedidos atualizados!');
}

async function saveOrders() {
  await window.storage.set(STORAGE_KEY, JSON.stringify(allOrders), true);
}

// ── POLLING (check for new orders every 15s) ─────────────────
function startPolling() {
  lastCount = allOrders.length;
  pollInterval = setInterval(async () => {
    try {
      const result = await window.storage.get(STORAGE_KEY, true);
      if (result) {
        const fresh = JSON.parse(result.value);
        if (fresh.length > lastCount) {
          const diff = fresh.length - lastCount;
          showToastMsg(`🔔 ${diff} novo(s) pedido(s) chegou!`);
          document.getElementById('badgeNew').style.display = 'inline-block';
          // Play beep
          try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const o = ctx.createOscillator(); const g = ctx.createGain();
            o.connect(g); g.connect(ctx.destination);
            o.frequency.value = 880; g.gain.setValueAtTime(.3, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + .4);
            o.start(); o.stop(ctx.currentTime + .4);
          } catch(e) {}
          allOrders = fresh;
          lastCount = fresh.length;
          renderOrders();
          updateStats();
        }
      }
    } catch(e) {}
  }, 15000);
}

// ── FILTER ───────────────────────────────────────────────────
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
}

// ── RENDER ───────────────────────────────────────────────────
function renderOrders() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  let list = allOrders.filter(o => {
    const matchFilter = currentFilter === 'Todos' || o.status === currentFilter;
    const matchSearch = !search ||
      o.nome?.toLowerCase().includes(search) ||
      o.cnpj?.toLowerCase().includes(search) ||
      o.code?.toLowerCase().includes(search);
    return matchFilter && matchSearch;
  });

  const container = document.getElementById('ordersList');
  if (list.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">Nenhum pedido encontrado</div></div>`;
    return;
  }

  container.innerHTML = list.map((o, visIdx) => {
    const realIdx = allOrders.indexOf(o);
    const isNew = o.status === 'Novo';
    const itemsHtml = (o.items || []).map(i =>
      `<div class="order-item-row">
        <span>${i.name} × ${i.qty}</span>
        <span>R$ ${i.subtotal.toLocaleString('pt-BR',{minimumFractionDigits:2})}</span>
      </div>`
    ).join('');

    const wppMsg = encodeURIComponent(
      `Olá ${o.nome}! Sou da Mil Bolhas. Vi seu pedido *${o.code}* no valor de R$ ${o.total?.toLocaleString('pt-BR',{minimumFractionDigits:2})}. Vamos confirmar? 😊`
    );
    const wppLink = `https://wa.me/55${o.telefone?.replace(/\D/g,'')}?text=${wppMsg}`;

    return `
    <div class="order-card ${isNew ? 'is-new' : ''}" id="card-${realIdx}">
      <div class="order-header" onclick="toggleCard(${realIdx})">
        <div class="order-code">${o.code}</div>
        <div class="order-client">
          <div class="order-client-name">${o.nome}</div>
          <div class="order-client-date">📅 ${o.data}</div>
        </div>
        <div class="order-total">R$ ${o.total?.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>
        <div class="order-status status-${o.status}">${o.status}</div>
        <div class="order-toggle">▼</div>
      </div>
      <div class="order-body" id="body-${realIdx}">
        <div class="order-info-grid">
          <div class="order-info-item"><label>CNPJ</label><span>${o.cnpj}</span></div>
          <div class="order-info-item"><label>Telefone</label><span>${o.telefone}</span></div>
          <div class="order-info-item"><label>E-mail</label><span>${o.email}</span></div>
          <div class="order-info-item"><label>Endereço</label><span>${o.endereco}</span></div>
        </div>
        <div class="order-items-title">Produtos</div>
        ${itemsHtml}
        <div class="order-actions">
          <button class="action-btn btn-wpp" onclick="window.open('${wppLink}','_blank')">💬 WhatsApp</button>
          <button class="action-btn btn-visto" onclick="changeStatus(${realIdx},'Visto')">👁️ Marcar Visto</button>
          <button class="action-btn btn-confirmar" onclick="changeStatus(${realIdx},'Confirmado')">✅ Confirmar</button>
          <button class="action-btn btn-cancelar" onclick="changeStatus(${realIdx},'Cancelado')">❌ Cancelar</button>
          <button class="action-btn btn-delete" onclick="deleteOrder(${realIdx})">🗑️ Excluir</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleCard(idx) {
  const body = document.getElementById('body-' + idx);
  body.classList.toggle('open');
  // Auto-mark as "Visto" when opened
  if (body.classList.contains('open') && allOrders[idx]?.status === 'Novo') {
    changeStatus(idx, 'Visto');
  }
}

async function changeStatus(idx, status) {
  allOrders[idx].status = status;
  await saveOrders();
  updateStats();
  renderOrders();
  // Hide new badge if no more "Novo"
  if (!allOrders.some(o => o.status === 'Novo')) {
    document.getElementById('badgeNew').style.display = 'none';
  }
}

async function deleteOrder(idx) {
  if (!confirm('Excluir este pedido permanentemente?')) return;
  allOrders.splice(idx, 1);
  await saveOrders();
  updateStats();
  renderOrders();
}

function updateStats() {
  const total = allOrders.length;
  const novos = allOrders.filter(o => o.status === 'Novo').length;
  const confirmados = allOrders.filter(o => o.status === 'Confirmado').length;
  const valor = allOrders.filter(o => o.status === 'Confirmado').reduce((s,o) => s + (o.total||0), 0);
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statNovos').textContent = novos;
  document.getElementById('statConfirmados').textContent = confirmados;
  document.getElementById('statValor').textContent = 'R$ ' + valor.toLocaleString('pt-BR',{minimumFractionDigits:2});
  if (novos > 0) document.getElementById('badgeNew').style.display = 'inline-block';
  else document.getElementById('badgeNew').style.display = 'none';
}

function showToastMsg(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 4000);
}
</script>
</body>
</html>
